<!DOCTYPE html>
<html>
<head>
  <title>Admin Login</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="container">

  <div class="login-card">

    <h1>Laundry Management System</h1>

    <p class="subtitle">
      Admin Dashboard Login
    </p>

    <form onsubmit="login(event)">

      <label>
        Username
        <span class="hint">
          [ demo: admin ]
        </span>
      </label>

      <input
        type="text"
        id="username"
        placeholder="Enter username"
      />

      <label>
        Password
        <span class="hint">
          [ demo: admin123 ]
        </span>
      </label>

      <input
        type="password"
        id="password"
        placeholder="Enter password"
      />

      <button type="submit">
        Login
      </button>

      <p id="error" class="error"></p>

    </form>

    <div class="footer">

      <p>
        Developed by Dhruv Khurana
      </p>

      <div class="links">

        <a
          href="mailto:DhruvKhurana162@gmail.com"
          target="_blank"
        >
          Gmail
        </a>

        <a
          href="https://www.linkedin.com/in/dhruv-khurana-756726219"
          target="_blank"
        >
          LinkedIn
        </a>

      </div>

    </div>

  </div>

</div>

<script src="../js/login.js"></script>

</body>
</html>
